<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- 배경 -->
  <rect width="1200" height="630" fill="#272727"/>

  <!-- 그리드 -->
  <defs>
    <pattern id="grid" x="0" y="0" width="117" height="117" patternUnits="userSpaceOnUse">
      <line x1="117" y1="0" x2="117" y2="117" stroke="rgba(217,217,217,0.35)" stroke-width="1"/>
      <line x1="0" y1="117" x2="117" y2="117" stroke="rgba(217,217,217,0.35)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- 흰 카드 -->
  <rect x="220" y="55" width="760" height="520" fill="#fcfcfc"/>

  <!-- 타이틀 -->
  <text x="600" y="250"
    font-family="Georgia, serif"
    font-size="88"
    font-weight="bold"
    fill="#191919"
    text-anchor="middle"
    letter-spacing="2">Photo Letter</text>

  <!-- 구분선 -->
  <line x1="320" y1="295" x2="880" y2="295" stroke="#ddd" stroke-width="1.5"/>

  <!-- 서브타이틀 -->
  <text x="600" y="375"
    font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif"
    font-size="30"
    fill="#555"
    text-anchor="middle">하고싶은 말을 쓰고 그 순간을 담아보세요</text>

  <!-- 카오모지 -->
  <text x="600" y="440"
    font-family="sans-serif"
    font-size="34"
    fill="#aaa"
    text-anchor="middle">*⸜( •ᴗ• )⸝*</text>
</svg>
